; PlatformIO Project Configuration File
; ESP32 + INMP441 microphone with WiFi live streaming

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Libraries: async web server + websockets (via git — registry names moved)
lib_deps =
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git

build_flags =
    -DCORE_DEBUG_LEVEL=1
